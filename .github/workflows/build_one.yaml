name: Build one
on:
  workflow_call:
    inputs: &reusable_inputs
      os:
        type: string
        required: true
      cibw_os:
        type: string
        required: true
      cibw_arch:
        type: string
        required: true
      cibw_py_ver:
        type: string
        default: 'cp314'
      # condition:
      #   type: boolean
      #   default: true
  workflow_dispatch:
    inputs: *reusable_inputs

jobs:
  
  build_one:
    name: ${{ inputs.cibw_os }}_${{ inputs.cibw_arch }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    # if: ${{ inputs.condition }}
    
    steps:
      
      - name: Check out the repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      
      - name: Set up QEMU
        if: ${{ !(inputs.cibw_arch == 'x86_64' || inputs.cibw_arch == 'aarch64') }}
        uses: docker/setup-qemu-action@v4
      
      - name: Download clang image
        if: ${{ endsWith(inputs.cibw_os, 'linux') && contains(fromJson('["ppc64le","riscv64","loongarch64","s390x"]'), inputs.cibw_arch) }}
        run: bash ./utils/install-static-clang.sh -d ./clang_image -m download-only
      
      - name: Build wheels
        uses: loong64/cibuildwheel@e2eb224eba52e082e342e0d7d7e1443a22a170f2  # v4.1.0
        env:
          CIBW_BUILD: "${{ inputs.cibw_py_ver }}-${{ inputs.cibw_os }}_${{ inputs.cibw_arch }}"
          CIBW_ARCHS: "${{ inputs.cibw_arch }}"
        with:
          output-dir: wheelhouse
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: cibw-${{ inputs.cibw_os }}_${{ inputs.cibw_arch }}
